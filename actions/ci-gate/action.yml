name: Run Shipguard CI gate
description: Run autopsy, SARIF export, review-comment, badge generation, step-summary output, check-run payload generation, and artifact upload from a Shipguard run summary.

inputs:
  run:
    description: Path to run.md.
    required: true
  diff:
    description: Optional diff path.
    required: false
    default: ""
  tests:
    description: Optional test log path.
    required: false
    default: ""
  task:
    description: Optional task contract path.
    required: false
    default: ""
  policy:
    description: Optional policy config path.
    required: false
    default: ""
  out:
    description: Output artifact directory.
    required: false
    default: artifacts/shipguard-gate
  mode:
    description: warn exits zero; fail exits non-zero on blocked reports.
    required: false
    default: warn
  artifact-name:
    description: Uploaded artifact name.
    required: false
    default: shipguard-gate
  post-check-run:
    description: Set true to post the generated check-run payload with the GitHub Checks API.
    required: false
    default: "false"
  github-token:
    description: Token used when post-check-run is true. Requires checks: write permission.
    required: false
    default: ""
  check-run-repository:
    description: Repository to post the check run to. Defaults to github.repository.
    required: false
    default: ""
  check-run-api-url:
    description: GitHub API base URL for check-run posting.
    required: false
    default: https://api.github.com

runs:
  using: composite
  steps:
    - name: Run CI gate
      shell: bash
      run: |
        args=(--run "${{ inputs.run }}" --out "${{ inputs.out }}" --mode "${{ inputs.mode }}")
        if [[ -n "${{ inputs.diff }}" ]]; then args+=(--diff "${{ inputs.diff }}"); fi
        if [[ -n "${{ inputs.tests }}" ]]; then args+=(--tests "${{ inputs.tests }}"); fi
        if [[ -n "${{ inputs.task }}" ]]; then args+=(--task "${{ inputs.task }}"); fi
        if [[ -n "${{ inputs.policy }}" ]]; then args+=(--policy "${{ inputs.policy }}"); fi
        "${{ github.action_path }}/../../bin/shipguard" ci-gate "${args[@]}"

    - name: Append CI gate step summary
      if: ${{ always() }}
      shell: bash
      run: |
        summary="${{ inputs.out }}/summary.md"
        if [[ -n "${GITHUB_STEP_SUMMARY:-}" && -f "$summary" ]]; then
          cat "$summary" >> "$GITHUB_STEP_SUMMARY"
        fi

    - name: Generate check-run payload
      if: ${{ always() }}
      shell: bash
      run: |
        "${{ github.action_path }}/../../bin/shipguard" check-run \
          --gate "${{ inputs.out }}/gate.json" \
          --head-sha "${{ github.sha }}" \
          --out "${{ inputs.out }}/check-run/payload.json"

    - name: Post check run
      if: ${{ always() && inputs.post-check-run == 'true' }}
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_API_URL: ${{ inputs.check-run-api-url }}
        DEFAULT_CHECK_RUN_REPOSITORY: ${{ github.repository }}
      run: |
        repo="${{ inputs.check-run-repository }}"
        if [[ -z "$repo" ]]; then
          repo="$DEFAULT_CHECK_RUN_REPOSITORY"
        fi
        "${{ github.action_path }}/../../bin/shipguard" check-run post \
          --payload "${{ inputs.out }}/check-run/payload.json" \
          --repo "$repo" \
          --out "${{ inputs.out }}/check-run/response.json"

    - name: Upload CI gate artifact
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.out }}
        if-no-files-found: error
