name: Compare Codex maintainer release proof
description: Download two release proof asset sets, compare them, and upload a release diff audit.

inputs:
  left-tag:
    description: Older release tag to compare.
    required: true
  right-tag:
    description: Newer release tag to compare.
    required: true
  repo:
    description: GitHub repository containing the release assets.
    required: false
    default: ""
  left-assets-dir:
    description: Directory for left release assets.
    required: false
    default: artifacts/codex-maintainer-release-diff/left
  right-assets-dir:
    description: Directory for right release assets.
    required: false
    default: artifacts/codex-maintainer-release-diff/right
  out:
    description: Directory for release diff output.
    required: false
    default: artifacts/codex-maintainer-release-diff/report
  download-assets:
    description: Set false to compare files already present in left-assets-dir and right-assets-dir.
    required: false
    default: "true"
  upload-artifact:
    description: Set false to skip diff artifact upload.
    required: false
    default: "true"
  artifact-name:
    description: Uploaded artifact name.
    required: false
    default: codex-maintainer-release-diff
  mode:
    description: Use fail to fail the job on invalid diff proof, or warn to emit warnings only.
    required: false
    default: fail

outputs:
  status:
    description: pass or fail.
    value: ${{ steps.release-diff.outputs.status }}
  release-diff:
    description: Path to release-diff.json.
    value: ${{ steps.release-diff.outputs.release-diff }}
  release-diff-md:
    description: Path to release-diff.md.
    value: ${{ steps.release-diff.outputs.release-diff-md }}

runs:
  using: composite
  steps:
    - name: Compare release proof assets
      id: release-diff
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        INPUT_LEFT_TAG: ${{ inputs.left-tag }}
        INPUT_RIGHT_TAG: ${{ inputs.right-tag }}
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_LEFT_ASSETS_DIR: ${{ inputs.left-assets-dir }}
        INPUT_RIGHT_ASSETS_DIR: ${{ inputs.right-assets-dir }}
        INPUT_OUT: ${{ inputs.out }}
        INPUT_DOWNLOAD_ASSETS: ${{ inputs.download-assets }}
        INPUT_MODE: ${{ inputs.mode }}
        DEFAULT_REPO: ${{ github.repository }}
      run: |
        set -euo pipefail

        root="${{ github.action_path }}/../.."
        # shellcheck source=/dev/null
        source "$root/scripts/lib/safe_paths.sh"
        left_tag="$INPUT_LEFT_TAG"
        right_tag="$INPUT_RIGHT_TAG"
        repo="$INPUT_REPO"
        left_assets_dir="$INPUT_LEFT_ASSETS_DIR"
        right_assets_dir="$INPUT_RIGHT_ASSETS_DIR"
        out="$INPUT_OUT"
        download_assets="$INPUT_DOWNLOAD_ASSETS"
        mode="$INPUT_MODE"

        if [[ -z "$left_tag" || -z "$right_tag" ]]; then
          echo "::error::left-tag and right-tag are required"
          exit 2
        fi

        if [[ -z "$repo" ]]; then
          repo="$DEFAULT_REPO"
        fi

        if [[ "$mode" != "fail" && "$mode" != "warn" ]]; then
          echo "::error::mode must be fail or warn"
          exit 2
        fi

        require_safe_artifact_dir "left-assets-dir" "$left_assets_dir" "$root" >/dev/null
        require_safe_artifact_dir "right-assets-dir" "$right_assets_dir" "$root" >/dev/null
        require_safe_artifact_dir "out" "$out" "$root" >/dev/null
        require_no_artifact_overlap "left-assets-dir" "$left_assets_dir" "right-assets-dir" "$right_assets_dir"
        require_no_artifact_overlap "left-assets-dir" "$left_assets_dir" "out" "$out"
        require_no_artifact_overlap "right-assets-dir" "$right_assets_dir" "out" "$out"

        if [[ "$download_assets" == "true" ]]; then
          safe_rm_artifact_dir "left-assets-dir" "$left_assets_dir" "$root"
          safe_rm_artifact_dir "right-assets-dir" "$right_assets_dir" "$root"
          mkdir -p "$left_assets_dir" "$right_assets_dir"
          gh release download "$left_tag" \
            --repo "$repo" \
            --dir "$left_assets_dir" \
            --clobber
          gh release download "$right_tag" \
            --repo "$repo" \
            --dir "$right_assets_dir" \
            --clobber
        elif [[ "$download_assets" == "false" ]]; then
          mkdir -p "$left_assets_dir" "$right_assets_dir"
        else
          echo "::error::download-assets must be true or false"
          exit 2
        fi

        mkdir -p "$out"

        set +e
        "$root/bin/codex-maintainer" release-diff compare \
          --left "$left_assets_dir" \
          --right "$right_assets_dir" \
          --out "$out"
        diff_exit="$?"
        set -e

        status="pass"
        if [[ "$diff_exit" -ne 0 ]]; then
          status="fail"
        fi

        {
          echo "status=$status"
          echo "release-diff=$out/release-diff.json"
          echo "release-diff-md=$out/release-diff.md"
        } >> "$GITHUB_OUTPUT"

        if [[ "$status" == "fail" ]]; then
          message="release diff audit failed for $repo $left_tag -> $right_tag"
          if [[ "$mode" == "warn" ]]; then
            echo "::warning::$message"
          else
            echo "::error::$message"
            exit "$diff_exit"
          fi
        fi

    - name: Upload release diff audit
      if: ${{ inputs.upload-artifact == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.out }}
        if-no-files-found: error
