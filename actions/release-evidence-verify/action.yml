name: Verify Codex maintainer release evidence
description: Verify a downloaded release evidence artifact and produce machine-readable consumption proof.

inputs:
  dir:
    description: Directory containing the downloaded release evidence artifact.
    required: false
    default: artifacts/codex-maintainer-release-evidence
  out:
    description: Directory for verification reports.
    required: false
    default: artifacts/codex-maintainer-release-evidence-verify
  require-diff:
    description: Use true to require release diff evidence, false to skip the requirement, or auto to accept either.
    required: false
    default: auto
  require-index:
    description: Use true to require evidence-index.json, false to skip the requirement, or auto to accept either.
    required: false
    default: auto
  download-artifact:
    description: Set true to download the release evidence artifact before verification.
    required: false
    default: "false"
  source-artifact-name:
    description: Evidence artifact name to download when download-artifact is true.
    required: false
    default: codex-maintainer-release-evidence
  upload-artifact:
    description: Set false to skip verification artifact upload.
    required: false
    default: "true"
  artifact-name:
    description: Uploaded verification artifact name.
    required: false
    default: codex-maintainer-release-evidence-verify
  mode:
    description: Use fail to fail the job on invalid evidence, or warn to emit warnings only.
    required: false
    default: fail

outputs:
  status:
    description: pass or blocked.
    value: ${{ steps.verify-evidence.outputs.status }}
  report-json:
    description: Path to evidence-verify.json.
    value: ${{ steps.verify-evidence.outputs.report-json }}
  report-md:
    description: Path to evidence-verify.md.
    value: ${{ steps.verify-evidence.outputs.report-md }}
  badge:
    description: Path to Shields-compatible badge JSON.
    value: ${{ steps.verify-evidence.outputs.badge }}

runs:
  using: composite
  steps:
    - name: Validate release evidence artifact paths
      shell: bash
      env:
        INPUT_DIR: ${{ inputs.dir }}
        INPUT_OUT: ${{ inputs.out }}
      run: |
        set -euo pipefail

        root="${{ github.action_path }}/../.."
        # shellcheck source=/dev/null
        source "$root/scripts/lib/safe_paths.sh"
        require_safe_artifact_dir "dir" "$INPUT_DIR" "$root" >/dev/null
        require_safe_artifact_dir "out" "$INPUT_OUT" "$root" >/dev/null
        require_no_artifact_overlap "dir" "$INPUT_DIR" "out" "$INPUT_OUT"

    - name: Download release evidence artifact
      if: ${{ inputs.download-artifact == 'true' }}
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.source-artifact-name }}
        path: ${{ inputs.dir }}

    - name: Verify release evidence artifact
      id: verify-evidence
      shell: bash
      env:
        INPUT_DIR: ${{ inputs.dir }}
        INPUT_OUT: ${{ inputs.out }}
        INPUT_REQUIRE_DIFF: ${{ inputs.require-diff }}
        INPUT_REQUIRE_INDEX: ${{ inputs.require-index }}
        INPUT_DOWNLOAD_ARTIFACT: ${{ inputs.download-artifact }}
        INPUT_MODE: ${{ inputs.mode }}
      run: |
        set -euo pipefail

        root="${{ github.action_path }}/../.."
        # shellcheck source=/dev/null
        source "$root/scripts/lib/safe_paths.sh"
        evidence_dir="$INPUT_DIR"
        out="$INPUT_OUT"
        require_diff="$INPUT_REQUIRE_DIFF"
        require_index="$INPUT_REQUIRE_INDEX"
        download_artifact="$INPUT_DOWNLOAD_ARTIFACT"
        mode="$INPUT_MODE"

        if [[ "$mode" != "fail" && "$mode" != "warn" ]]; then
          echo "::error::mode must be fail or warn"
          exit 2
        fi
        if [[ "$require_diff" != "auto" && "$require_diff" != "true" && "$require_diff" != "false" ]]; then
          echo "::error::require-diff must be auto, true, or false"
          exit 2
        fi
        if [[ "$require_index" != "auto" && "$require_index" != "true" && "$require_index" != "false" ]]; then
          echo "::error::require-index must be auto, true, or false"
          exit 2
        fi
        if [[ "$download_artifact" != "true" && "$download_artifact" != "false" ]]; then
          echo "::error::download-artifact must be true or false"
          exit 2
        fi
        require_safe_artifact_dir "dir" "$evidence_dir" "$root" >/dev/null
        require_safe_artifact_dir "out" "$out" "$root" >/dev/null
        require_no_artifact_overlap "dir" "$evidence_dir" "out" "$out"

        verify_exit=0
        set +e
        "$root/bin/codex-maintainer" release-evidence verify \
          --dir "$evidence_dir" \
          --out "$out" \
          --require-diff "$require_diff" \
          --require-index "$require_index"
        verify_exit="$?"
        set -e

        status="pass"
        if [[ "$verify_exit" -ne 0 ]]; then
          status="blocked"
        fi

        {
          echo "status=$status"
          echo "report-json=$out/evidence-verify.json"
          echo "report-md=$out/evidence-verify.md"
          echo "badge=$out/badge.json"
        } >> "$GITHUB_OUTPUT"

        if [[ "$status" == "blocked" ]]; then
          message="release evidence verification failed"
          if [[ "$mode" == "warn" ]]; then
            echo "::warning::$message"
          else
            echo "::error::$message"
            exit "$verify_exit"
          fi
        fi

    - name: Upload release evidence verification artifact
      if: ${{ inputs.upload-artifact == 'true' && steps.verify-evidence.outputs.status == 'pass' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.out }}
        if-no-files-found: error
