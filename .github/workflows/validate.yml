name: Validate workflow bundle

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Validate workflow bundle
        run: ./bin/codex-maintainer validate

      - name: Run CLI smoke tests
        run: ./tests/cli_smoke_test.sh

      - name: Run template profile tests
        run: ./tests/template_profiles_test.sh

      - name: Run autopsy tests
        run: ./tests/autopsy_test.sh

      - name: Run action artifact tests
        run: ./tests/action_artifact_test.sh

      - name: Run arena tests
        run: ./tests/arena_test.sh

      - name: Run arena import tests
        run: ./tests/arena_import_test.sh

      - name: Run arena sign tests
        run: ./tests/arena_sign_test.sh

      - name: Run arena compare tests
        run: ./tests/arena_compare_test.sh

      - name: Run arena compare action tests
        run: ./tests/arena_compare_action_test.sh

      - name: Run review comment tests
        run: ./tests/review_comment_test.sh

      - name: Run policy tests
        run: ./tests/policy_test.sh

      - name: Run check run tests
        run: ./tests/check_run_test.sh

      - name: Run check run post tests
        run: ./tests/check_run_post_test.sh

      - name: Run CI gate tests
        run: ./tests/ci_gate_test.sh

      - name: Run CI summary tests
        run: ./tests/ci_summary_test.sh

      - name: Run SARIF tests
        run: ./tests/sarif_test.sh

      - name: Run docs check tests
        run: ./tests/docs_check_test.sh

      - name: Run docs check action tests
        run: ./tests/docs_check_action_test.sh

      - name: Run iOS doctor tests
        run: ./tests/ios_doctor_test.sh

      - name: Run iOS inventory tests
        run: ./tests/ios_inventory_test.sh

      - name: Run iOS target risk map tests
        run: ./tests/ios_target_risk_map_test.sh

      - name: Run iOS goal loop tests
        run: ./tests/ios_goal_loop_test.sh

      - name: Run safe path tests
        run: ./tests/safe_paths_test.sh

      - name: Run transcript redaction tests
        run: ./tests/transcript_redaction_test.sh

      - name: Run transcript verify tests
        run: ./tests/transcript_verify_test.sh

      - name: Run transcript verify action tests
        run: ./tests/transcript_verify_action_test.sh

      - name: Run transcript corpus tests
        run: ./tests/transcript_corpus_test.sh

      - name: Run transcript corpus action tests
        run: ./tests/transcript_corpus_action_test.sh

      - name: Run leaderboard tests
        run: ./tests/leaderboard_test.sh

      - name: Run self audit tests
        run: ./tests/self_audit_test.sh

      - name: Run next goal tests
        run: ./tests/next_goal_test.sh

      - name: Run release manifest tests
        run: ./tests/release_manifest_test.sh

      - name: Run release proof tests
        run: ./tests/release_proof_test.sh

      - name: Run release attest tests
        run: ./tests/release_attest_test.sh

      - name: Run release index tests
        run: ./tests/release_index_test.sh

      - name: Run release consume tests
        run: ./tests/release_consume_test.sh

      - name: Run release consume action tests
        run: ./tests/release_consume_action_test.sh

      - name: Run release diff tests
        run: ./tests/release_diff_test.sh

      - name: Run release diff action tests
        run: ./tests/release_diff_action_test.sh

      - name: Run release evidence tests
        run: ./tests/release_evidence_test.sh

      - name: Run release evidence action tests
        run: ./tests/release_evidence_action_test.sh

      - name: Run release evidence verify tests
        run: ./tests/release_evidence_verify_test.sh

      - name: Run release evidence verify action tests
        run: ./tests/release_evidence_verify_action_test.sh

      - name: Run release evidence negative index action tests
        run: ./tests/release_evidence_negative_index_action_test.sh

      - name: Run release replay tests
        run: ./tests/release_replay_test.sh

      - name: Run release proof action tests
        run: ./tests/release_proof_action_test.sh

      - name: Run release proof consumption tests
        run: ./tests/release_proof_consumption_test.sh

      - name: Run release proof workflow tests
        run: ./tests/release_proof_workflow_test.sh

      - name: Run release package tests
        run: ./tests/package_release_test.sh

      - name: Validate through reusable action
        uses: ./actions/validate
