# shipguard policy
#
# This is a plain key=value file. Values are regular expressions consumed by grep -E.

max_changed_files=3
protected_patterns=Secrets|Credentials|Protected|AlarmRuntime|StoreKit
validation_claim_patterns=(^|[^A-Za-z])((tests?|validation|ci).*(passed|green|success|succeeded)|all tests passed)([^A-Za-z]|$)
risky_claim_patterns=(^|[^A-Za-z])(release[- ]ready|production[- ]ready|security[- ]safe|no vulnerabilities|secure|approved|live|guaranteed|proven)([^A-Za-z]|$)
warn_below=10
fail_below=7
