name: Build release proof manually

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: Release tag to prove, such as v3.39.0.
        required: true
        type: string
      release-url:
        description: Public GitHub release URL for the tag.
        required: true
        type: string
      issue-url:
        description: Optional tracking issue URL.
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  release-proof:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Build Codex maintainer release proof
        id: release-proof
        uses: jlekerli-source/ringly-codex-workflows/actions/release-proof@v3.39.0
        with:
          tag: ${{ inputs.release-tag }}
          release-url: ${{ inputs.release-url }}
          issue-url: ${{ inputs.issue-url }}
          out: artifacts/codex-maintainer-release-proof
          artifact-name: codex-maintainer-release-proof-${{ inputs.release-tag }}

      - name: Print proof paths
        run: |
          echo "tarball=${{ steps.release-proof.outputs.tarball }}"
          echo "manifest=${{ steps.release-proof.outputs.manifest }}"
          echo "replay=${{ steps.release-proof.outputs.replay }}"
          echo "attestation=${{ steps.release-proof.outputs.attestation }}"
          echo "attestation-badge=${{ steps.release-proof.outputs.attestation-badge }}"
