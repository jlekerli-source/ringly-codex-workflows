name: Export ShipGuard release evidence

on:
  workflow_dispatch:
    inputs:
      previous-tag:
        description: Previous release tag to compare.
        required: true
        default: v3.22.0
      release-tag:
        description: Release tag to verify and export.
        required: true
        default: v3.91.0

permissions:
  contents: read

jobs:
  export-release-evidence:
    runs-on: ubuntu-latest
    steps:
      - name: Verify published proof assets
        uses: jlekerli-source/ShipGuard/actions/release-consume@v3.91.0
        with:
          repo: jlekerli-source/ShipGuard
          release-tag: ${{ inputs.release-tag }}
          mode: fail

      - name: Compare release proof assets
        uses: jlekerli-source/ShipGuard/actions/release-diff@v3.91.0
        with:
          repo: jlekerli-source/ShipGuard
          left-tag: ${{ inputs.previous-tag }}
          right-tag: ${{ inputs.release-tag }}
          mode: fail

      - name: Export release evidence
        uses: jlekerli-source/ShipGuard/actions/release-evidence@v3.91.0
        with:
          title: ShipGuard Release Evidence
          include-diff: auto
          build-index: true
          mode: fail
