name: Verify Shipguard release proof

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: Release tag to verify, such as v3.38.0.
        required: true
        default: v3.38.0

permissions:
  contents: read

jobs:
  verify-release-proof:
    runs-on: ubuntu-latest
    steps:
      - name: Verify published proof assets
        uses: jlekerli-source/shipguard/actions/release-consume@v3.38.0
        with:
          repo: jlekerli-source/shipguard
          release-tag: ${{ inputs.release-tag }}
          mode: fail
