name: Verify ShipGuard release proof

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: Release tag to verify, such as v3.113.0.
        required: true
        default: v3.113.0

permissions:
  contents: read

jobs:
  verify-release-proof:
    runs-on: ubuntu-latest
    steps:
      - name: Verify published proof assets
        uses: jlekerli-source/ShipGuard/actions/release-consume@v3.113.0
        with:
          repo: jlekerli-source/ShipGuard
          release-tag: ${{ inputs.release-tag }}
          mode: fail
