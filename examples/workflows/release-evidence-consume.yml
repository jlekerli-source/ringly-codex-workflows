name: Build and verify ShipGuard release evidence

on:
  workflow_dispatch:
    inputs:
      previous-tag:
        description: Previous release tag to compare.
        required: true
        default: v3.22.0
      release-tag:
        description: Release tag to verify and export.
        required: true
        default: v3.59.0

permissions:
  contents: read

jobs:
  build-release-evidence:
    runs-on: ubuntu-latest
    steps:
      - name: Build release evidence bundle
        uses: jlekerli-source/ShipGuard/actions/release-evidence@v3.59.0
        with:
          run: bundle
          repo: jlekerli-source/ShipGuard
          release-tag: ${{ inputs.release-tag }}
          previous-tag: ${{ inputs.previous-tag }}
          download-assets: true
          artifact-name: shipguard-release-evidence
          mode: fail

  verify-release-evidence:
    runs-on: ubuntu-latest
    needs: build-release-evidence
    steps:
      - name: Verify release evidence artifact
        uses: jlekerli-source/ShipGuard/actions/release-evidence-verify@v3.59.0
        with:
          download-artifact: true
          source-artifact-name: shipguard-release-evidence
          dir: artifacts/shipguard-release-evidence
          require-diff: true
          require-index: true
          mode: fail
